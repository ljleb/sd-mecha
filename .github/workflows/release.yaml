name: Test, build, and publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
          cache: pip

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]

      - name: Validate pyproject version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, pathlib, re, sys

          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not m:
              print("Could not find [project].version in pyproject.toml", file=sys.stderr)
              sys.exit(1)

          version = m.group(1)
          tag = os.environ["TAG_NAME"]

          if version != tag:
              print(f"Version mismatch: pyproject.toml has {version}, tag is {tag}", file=sys.stderr)
              sys.exit(1)
          PY

      - uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - run: python -m pip install --upgrade pip
      - run: python -m pip install build
      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
